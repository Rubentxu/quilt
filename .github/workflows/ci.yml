# ── Quilt CI ──────────────────────────────────────────────────────────
# Runs on every push/PR to main branches.
# Three stages: format → lint → test → (optional) e2e

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint (fmt + clippy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add rustfmt clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy
        # NOTE: `-D warnings` is intentionally NOT set here because the
        # codebase has pre-existing clippy warnings that need gradual cleanup.
        # Once depot is clean, upgrade to: cargo clippy -- -D warnings

  test:
    name: "Test (cargo test)"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test

  # ── E2E smoke tests (playwright) ──────────────────────────────────
  # Gated: only runs if trunk and node are available.
  # For full E2E, requires npm install + trunk build in quilt-ui.
  e2e:
    name: "E2E (Playwright smoke)"
    needs: lint
    runs-on: ubuntu-latest
    # Gate: only on push to main branches, not on every PR
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + wasm target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Cargo + npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
            crates/quilt-ui/node_modules
            e2e/node_modules
          key: ${{ runner.os }}-e2e-${{ hashFiles('**/Cargo.lock', 'crates/quilt-ui/package.json', 'e2e/package.json') }}

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Install UI npm dependencies
        run: cd crates/quilt-ui && npm ci

      - name: Build Tailwind CSS
        run: cd crates/quilt-ui && npm run tailwind:build

      - name: Install Playwright
        run: |
          cd e2e && npm ci
          npx playwright install chromium --with-deps

      - name: Start trunk dev server
        run: |
          cd crates/quilt-ui && trunk serve --port 8080 &
          sleep 5
          # Wait for server to be ready
          for i in $(seq 1 10); do
            curl -s http://localhost:8080 > /dev/null 2>&1 && break
            sleep 2
          done

      - name: Run E2E tests
        run: cd e2e && npx playwright test

      - name: Upload E2E artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
