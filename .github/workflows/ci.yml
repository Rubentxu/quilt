name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ──── Rust checks ──────────────────────────────────────────
  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Build
        run: cargo build --workspace --all-targets
      - name: Test
        run: cargo test --workspace --all-features --no-fail-fast
        env:
          RUST_BACKTRACE: 1
      - name: Doc tests
        run: cargo test --workspace --doc

  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Generate coverage (LCOV)
        run: cargo llvm-cov --workspace --all-features --lcov --output-path coverage/lcov.info --ignore-run-fail
      - name: Print coverage summary
        run: cargo llvm-cov --workspace --all-features --summary-only --ignore-run-fail
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ──── Frontend checks ─────────────────────────────────────
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'quilt-ui/package-lock.json'
      - name: Install
        working-directory: quilt-ui
        run: npm ci
      - name: Type check
        working-directory: quilt-ui
        run: npx tsc --noEmit
      - name: Build
        working-directory: quilt-ui
        run: npm run build
      - name: TypeScript tests
        # Runs component tests + the bundle-budget tests (which
        # require the `dist/` produced by the previous step).
        working-directory: quilt-ui
        run: npx vitest run
      - name: Lint
        working-directory: quilt-ui
        run: npm run lint || echo "lint not configured, skipping"

  # ──── E2E tests ──────────────────────────────────────────
  e2e:
    name: E2E Playwright
    runs-on: ubuntu-latest
    needs: [rust-test, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - name: Build WASM
        run: wasm-pack build crates/quilt-core --target web --no-opt
      - name: Install Playwright deps
        run: |
          cd tests/e2e
          npm ci
          npx playwright install --with-deps chromium
      - name: Start backend
        run: |
          cargo run -p quilt-bin -- --port 3737 &
          echo $! > /tmp/backend.pid
          sleep 10
      - name: Start frontend
        run: |
          cd quilt-ui
          npm run dev &
          echo $! > /tmp/frontend.pid
          sleep 10
      - name: Run E2E tests
        run: |
          cd tests/e2e
          npx playwright test --reporter=github
      - name: Run accessibility tests
        run: |
          cd tests/e2e
          npx playwright test accessibility --reporter=github
      - name: Run visual regression tests
        # First runs may not have baselines yet — don't fail the build.
        # Baselines get committed in a follow-up PR for review.
        continue-on-error: true
        run: |
          cd tests/e2e
          npx playwright test visual-regression --reporter=github
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
      - name: Cleanup
        if: always()
        run: |
          [ -f /tmp/backend.pid ] && kill $(cat /tmp/backend.pid) || true
          [ -f /tmp/frontend.pid ] && kill $(cat /tmp/frontend.pid) || true

  # ──── Containerized test (Podman) ─────────────────────────
  container-test:
    name: Containerized Tests (Podman)
    runs-on: ubuntu-latest
    needs: [rust-test, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Build test container
        run: podman build -t quilt:test -f Containerfile.test .
      - name: Run Rust tests
        run: podman run --rm -v .:/src:Z quilt:test cargo test
      - name: Run Vitest
        run: podman run --rm -v .:/src:Z -w /src/quilt-ui quilt:test npx vitest run
      - name: Run E2E smoke (container)
        run: podman run --rm -v .:/src:Z --network host quilt:test npx playwright test --grep @smoke --reporter=github

  # Add container-test to full-check
  full-check:
    name: Full Check
    runs-on: ubuntu-latest
    needs: [rust-fmt, rust-clippy, rust-test, frontend, container-test]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.rust-fmt.result }}" != "success" ] || \
             [ "${{ needs.rust-clippy.result }}" != "success" ] || \
             [ "${{ needs.rust-test.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.container-test.result }}" != "success" ]; then
            exit 1
          fi
          echo "All checks passed ✓"
